<div class="app-shell" *ngIf="router.url !== '/'">

    <div class="nav-brand">
      <span class="brand-text">Gran Torneo Galáctico</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" routerLink="/ranking" routerLinkActive="active">Ranking</a>
      <a class="nav-link" routerLink="/species" routerLinkActive="active">Especies</a>
      <a class="nav-link" routerLink="/combats" routerLinkActive="active">Combates</a>
    </div>
  </nav>
  <main class="cosmic-main">

  </main>
</div>

<router-outlet *ngIf="router.url === '/'"></router-outlet>
