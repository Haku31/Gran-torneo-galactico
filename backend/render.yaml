services:
  - type: web
    name: torneo-galactico-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests -B
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: torneo-galactico-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: torneo-galactico-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: torneo-galactico-db
          property: password
      - key: ALLOWED_ORIGINS
        value: https://torneo-galactico.vercel.app
      - key: PORT
        value: "8080"

databases:
  - name: torneo-galactico-db
    databaseName: torneo_galactico
    plan: free
