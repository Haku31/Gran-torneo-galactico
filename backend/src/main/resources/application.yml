spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/torneo_galactico}
    username: ${DATABASE_USERNAME:torneo_user}
    password: ${DATABASE_PASSWORD:torneo_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
