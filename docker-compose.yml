services:
  postgres:
    image: postgres:17-alpine
    container_name: torneo_postgres
    environment:
      POSTGRES_DB: torneo_galactico
      POSTGRES_USER: torneo_user
      POSTGRES_PASSWORD: torneo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U torneo_user -d torneo_galactico"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torneo_backend
    ports:
      - "8090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/torneo_galactico
      SPRING_DATASOURCE_USERNAME: torneo_user
      SPRING_DATASOURCE_PASSWORD: torneo_pass
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: torneo_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
